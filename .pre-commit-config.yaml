repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      # Name is set for the version to be displayed at hook execution
      - id: ruff-check # linter
        args: [ --fix ]
        name: ruff-check-v0.15.4
      - id: ruff-format
        name: ruff-format-v0.15.4
